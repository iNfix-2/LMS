{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block main %}
<div class="container py-5" style="margin-top: 20px;">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 p-md-5" style="border-radius: 15px; background: #fff;">
                <div class="mb-4">
                    <h2 class="fw-bold" style="color: #002769; font-family: 'Montserrat', sans-serif;">Manual Access Grant</h2>
                    <p class="text-muted">Manually grant course access to students and optionally log cash/offline payments.</p>
                </div>
                
                <form method="POST" class="needs-validation" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg" style="background-color: #002769; border: none; border-radius: 10px; font-weight: 600;">
                            Grant Access
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% block extra_js %}
<script>
    // Enable client-side form validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
    })()
</script>
{% endblock extra_js %}
{% endblock main %}
