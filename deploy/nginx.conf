# Edukom Learning LMS Nginx configuration block
# Routes wildcard subdomains dynamically to the Django back-end

upstream edukom_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name edukom.com *.edukom.com; # Wildcard subdomains support

    client_max_body_size 50M;

    # Static files serving
    location /static/ {
        alias /home/ini/Desktop/edukomLMS-A/learning/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media files serving
    location /media/ {
        alias /home/ini/Desktop/edukomLMS-A/learning/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy headers and routing to Gunicorn
    location / {
        proxy_pass http://edukom_app;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        # Crucial for tenancy.middleware: Nginx passes the requested hostname
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for SCORM content / interactive tracking responses
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
    }
}
